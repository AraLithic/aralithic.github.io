<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AraLithic OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #030a0f;
      --bg1:    #060d14;
      --cyan:   #00d4ff;
      --cyan2:  #00ffea;
      --green:  #00ff88;
      --amber:  #ffb300;
      --red:    #ff4466;
      --purple: #bb88ff;
      --pink:   #ff6eb4;
      --white:  #d0e8f0;
      --dim:    #3a5a6a;
      --muted:  #1e3040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--white);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    #cur {
      position: fixed;
      width: 2px; height: 18px;
      background: var(--cyan);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px var(--cyan);
      animation: curBlink .7s infinite;
    }

    /* ── SCANLINES ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9000;
    }

    /* ── GRID ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,180,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    #topbar {
      flex-shrink: 0;
      height: 28px;
      background: rgba(0,20,35,0.95);
      border-bottom: 1px solid rgba(0,200,255,0.15);
      display: flex;
      align-items: center;
      padding: 0 1.2rem;
      gap: 1rem;
      font-size: .58rem;
      letter-spacing: .14em;
      color: var(--dim);
      z-index: 100;
      user-select: none;
    }
    .tb-brand { color: var(--cyan); font-weight: 700; letter-spacing: .22em; }
    .tb-sep { width: 1px; height: 12px; background: rgba(0,200,255,0.15); }
    #tb-clock { font-variant-numeric: tabular-nums; color: var(--dim); }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .tb-status { display: flex; align-items: center; gap: .4rem; }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }

    /* ── SCREENS ── */
    #screen {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .screen-view {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
    }
    .screen-view.active { display: flex; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    .login-ascii {
      font-size: .52rem;
      line-height: 1.25;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,200,255,0.55), 0 0 2px rgba(0,200,255,0.9);
      text-align: center;
      white-space: pre;
      letter-spacing: .01em;
    }
    .login-sub {
      font-size: .62rem;
      color: var(--dim);
      letter-spacing: .2em;
      text-align: center;
    }
    .login-prompt-line {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
    }
    .lp-label { color: var(--green); }
    #login-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      width: 160px;
      caret-color: var(--cyan);
    }
    .login-hint { font-size: .58rem; color: var(--muted); letter-spacing: .12em; }
    .login-error { font-size: .62rem; color: var(--red); display: none; }

    /* ── BOOT SCREEN ── */
    #boot-screen {
      padding: 1.5rem 2rem;
      overflow: hidden;
    }
    #boot-output {
      font-size: .7rem;
      line-height: 1.9;
      color: var(--white);
      white-space: pre-wrap;
      overflow: hidden;
    }

    /* ── TERMINAL SCREEN ── */
    #terminal-screen {
      flex-direction: column;
    }
    #terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      font-size: .7rem;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #terminal-output::-webkit-scrollbar { width: 4px; }
    #terminal-output::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.15); border-radius: 2px; }

    /* ── INPUT BAR ── */
    #input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem 1.5rem;
      border-top: 1px solid rgba(0,200,255,0.1);
      background: rgba(0,10,18,0.8);
    }
    .prompt-ps1 { color: var(--green); font-size: .7rem; white-space: nowrap; flex-shrink: 0; }
    .prompt-ps1 .host { color: var(--cyan); }
    .prompt-ps1 .path { color: var(--purple); }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      caret-color: var(--cyan);
    }

    /* ── COLORS ── */
    .c-cyan   { color: var(--cyan); }
    .c-cyan2  { color: var(--cyan2); }
    .c-green  { color: var(--green); }
    .c-amber  { color: var(--amber); }
    .c-red    { color: var(--red); }
    .c-purple { color: var(--purple); }
    .c-pink   { color: var(--pink); }
    .c-dim    { color: var(--dim); }
    .c-white  { color: var(--white); }
    .c-muted  { color: #2a4455; }
    .bold     { font-weight: 700; }

    /* GLOW effects */
    .glow-cyan  { text-shadow: 0 0 10px rgba(0,212,255,0.7), 0 0 25px rgba(0,212,255,0.3); }
    .glow-green { text-shadow: 0 0 10px rgba(0,255,136,0.6); }
    .glow-amber { text-shadow: 0 0 10px rgba(255,179,0,0.6); }

    /* ── OUTPUT LINE TYPES ── */
    .out-line { display: block; }
    .out-line.cmd-echo { color: var(--dim); }
    .out-line.sep { color: var(--muted); }

    /* Section headers */
    .sec-bar {
      display: block;
      border-top: 1px solid rgba(0,200,255,0.12);
      margin: .5rem 0 .3rem;
    }

    /* Tables */
    .tbl { display: grid; }
    .tbl-row { display: flex; gap: 1rem; padding: .1rem 0; }
    .tbl-key { color: var(--cyan); min-width: 140px; flex-shrink: 0; }
    .tbl-val { color: var(--white); }

    /* Progress bars */
    .pbar-row { display: flex; align-items: center; gap: .8rem; margin: .15rem 0; font-size: .66rem; }
    .pbar-label { color: var(--white); min-width: 130px; }
    .pbar-track { flex: 1; max-width: 180px; height: 6px; background: #0d2030; border-radius: 2px; overflow: hidden; border: 1px solid rgba(0,200,255,0.1); }
    .pbar-fill { height: 100%; border-radius: 2px; }
    .pbar-fill.high  { background: linear-gradient(90deg, var(--cyan), var(--cyan2)); box-shadow: 0 0 6px var(--cyan); }
    .pbar-fill.med   { background: linear-gradient(90deg, var(--green), var(--cyan2)); box-shadow: 0 0 4px var(--green); }
    .pbar-fill.low   { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
    .pbar-pct { color: var(--dim); min-width: 36px; }

    /* Tag pills */
    .tag-wrap { display: flex; flex-wrap: wrap; gap: .4rem; margin: .3rem 0; }
    .tag {
      font-size: .58rem;
      padding: .2rem .6rem;
      border-radius: 2px;
      border: 1px solid;
      letter-spacing: .06em;
    }
    .tag.cyan   { border-color: rgba(0,212,255,0.35); color: var(--cyan); background: rgba(0,212,255,0.06); }
    .tag.green  { border-color: rgba(0,255,136,0.3); color: var(--green); background: rgba(0,255,136,0.05); }
    .tag.amber  { border-color: rgba(255,179,0,0.3); color: var(--amber); background: rgba(255,179,0,0.05); }
    .tag.purple { border-color: rgba(187,136,255,0.3); color: var(--purple); background: rgba(187,136,255,0.05); }

    /* Paper card */
    .paper-box {
      border: 1px solid rgba(255,179,0,0.25);
      border-left: 3px solid var(--amber);
      padding: .7rem 1rem;
      margin: .4rem 0;
      background: rgba(255,179,0,0.03);
      border-radius: 0 3px 3px 0;
    }
    .paper-box .pt { color: var(--amber); font-size: .72rem; font-weight: 700; line-height: 1.5; }
    .paper-box .pm { color: var(--dim); font-size: .6rem; margin-top: .3rem; }

    /* Project row */
    .proj-box {
      border-bottom: 1px solid rgba(0,200,255,0.07);
      padding: .5rem 0;
      display: flex;
      gap: 1.5rem;
    }
    .proj-box .pn { color: var(--cyan); min-width: 32px; opacity: .5; }
    .proj-box .ptitle { color: var(--white); font-weight: 500; min-width: 240px; }
    .proj-box .pdesc { color: var(--dim); font-size: .65rem; flex: 1; }
    .proj-box .pbadge { font-size: .55rem; padding: .1rem .5rem; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }

    /* Location row */
    .loc-row { display: flex; align-items: center; gap: .8rem; padding: .25rem 0; }
    .loc-dot { color: var(--cyan); }
    .loc-n { color: var(--white); min-width: 100px; }
    .loc-note { color: var(--dim); font-size: .62rem; }

    /* ── ASCII ART WRAPPER ── */
    .ascii-art {
      font-size: .6rem;
      line-height: 1.25;
      white-space: pre;
      display: inline-block;
    }

    /* ── NEOFETCH LAYOUT ── */
    .neofetch-wrap {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
      padding: .3rem 0;
    }
    .neofetch-info { min-width: 300px; }
    .nf-row { display: flex; gap: .6rem; font-size: .68rem; padding: .08rem 0; }
    .nf-key { color: var(--cyan); min-width: 100px; }
    .nf-val { color: var(--white); }
    .nf-sep { color: var(--cyan); margin: .15rem 0; }

    /* ── HELP TABLE ── */
    .help-row { display: flex; gap: 1.5rem; padding: .12rem 0; font-size: .68rem; }
    .help-cmd { color: var(--cyan); min-width: 140px; font-weight: 500; }
    .help-desc { color: var(--dim); }

    /* ── ANIMATIONS ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }
    @keyframes curBlink {
      0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; }
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0); }
    }
    .glitch-once { animation: glitch .15s 2; }

    @media (max-width: 700px) {
      .neofetch-wrap { flex-direction: column; gap: 1rem; }
      .ascii-art { font-size: .48rem; }
      .proj-box { flex-direction: column; gap: .2rem; }
      .proj-box .pdesc { display: none; }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cur"></div>

<!-- Topbar -->
<div id="topbar">
  <span class="tb-brand">ARALITHIC<span style="color:var(--dim)">-OS</span></span>
  <div class="tb-sep"></div>
  <span style="color:var(--dim)">v2.1.0-lts</span>
  <div class="tb-sep"></div>
  <span id="tb-date" style="color:var(--dim)"></span>
  <div class="tb-right">
    <div class="tb-status">
      <div class="sdot"></div>
      <span style="letter-spacing:.12em">OPEN TO OPPORTUNITIES</span>
    </div>
    <div class="tb-sep"></div>
    <span id="tb-clock"></span>
  </div>
</div>

<!-- Main screen area -->
<div id="screen">

  <!-- ══ LOGIN SCREEN ══ -->
  <div class="screen-view active" id="login-screen">
    <div class="login-ascii" id="login-ascii"></div>
    <div class="login-sub">ARALITHIC-OS  ·  KERNEL 2.1.0  ·  x86_64</div>
    <div class="login-prompt-line">
      <span class="lp-label">aralithic login:</span>
      <input id="login-input" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="">
    </div>
    <div class="login-hint">type <span style="color:var(--cyan)">boot</span> and press enter to initialize</div>
    <div class="login-error" id="login-error">unauthorized — try again</div>
  </div>

  <!-- ══ BOOT SCREEN ══ -->
  <div class="screen-view" id="boot-screen">
    <div id="boot-output"></div>
  </div>

  <!-- ══ TERMINAL SCREEN ══ -->
  <div class="screen-view" id="terminal-screen">
    <div id="terminal-output"></div>
    <div id="input-bar">
      <span class="prompt-ps1">
        <span class="c-green">umair</span><span class="c-dim">@</span><span class="host c-cyan">aralithic</span><span class="c-dim">:</span><span class="path c-purple">~</span><span class="c-dim">$</span>
      </span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════

const sleep = ms => new Promise(r => setTimeout(r, ms));

// Single global uptime tracker — cleared on each neofetch render
let _uptimeInterval = null;
let _uptimeStart = null;

function h(tag, cls, html) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  return el;
}

// Cursor tracking
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// Clock — aligned to the exact second boundary to prevent flicker
function updateClock() {
  const now = new Date();
  document.getElementById('tb-clock').textContent =
    now.toLocaleTimeString('en-GB', { hour12: false });
  document.getElementById('tb-date').textContent =
    now.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
}
function scheduleClock() {
  updateClock();
  const msToNextSecond = 1000 - (Date.now() % 1000);
  setTimeout(() => {
    updateClock();
    setInterval(updateClock, 1000);
  }, msToNextSecond);
}
scheduleClock();

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// SCREEN MANAGER
// ═══════════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen-view').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════

const loginInput = document.getElementById('login-input');
const loginError = document.getElementById('login-error');

loginInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const val = loginInput.value.trim().toLowerCase();
  loginInput.value = '';
  if (val === 'boot') {
    showScreen('boot-screen');
    await runBoot();
  } else {
    loginError.style.display = 'block';
    loginError.classList.add('glitch-once');
    setTimeout(() => { loginError.style.display = 'none'; loginError.classList.remove('glitch-once'); }, 2000);
  }
});

// ═══════════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════

const bootOut = document.getElementById('boot-output');

function bootLine(html, delay = 0) {
  return new Promise(r => {
    setTimeout(() => {
      const line = document.createElement('div');
      line.innerHTML = html;
      bootOut.appendChild(line);
      r();
    }, delay);
  });
}

async function typeBootText(text, color = '#3a5a6a', speed = 22) {
  const span = document.createElement('span');
  span.style.color = color;
  bootOut.appendChild(span);
  for (const ch of text) {
    span.textContent += ch;
    await sleep(speed);
  }
  bootOut.appendChild(document.createElement('br'));
}

  { html: `<span style="color:#3a5a6a">       astrophysics    </span><span style="color:var(--green)">LOADED</span>`, d: 140 },

const termOut = document.getElementById('terminal-output');

let autoScroll = false; // only scroll on user-typed commands

function write(html) {
  const el = document.createElement('div');
  el.innerHTML = html;
  termOut.appendChild(el);
  if (autoScroll) termOut.scrollTop = termOut.scrollHeight;
}
function writeln(html = '') { write(html); }
function writeEl(el) {
  termOut.appendChild(el);
  if (autoScroll) termOut.scrollTop = termOut.scrollHeight;
}
function blank() { writeln(''); }
function scrollToBottom() { termOut.scrollTop = termOut.scrollHeight; }

async function writeLines(lines, delayMs = 18) {
  for (const ln of lines) {
    await sleep(delayMs);
    writeln(ln);
    termOut.scrollTop = termOut.scrollHeight;
  }
}

// COMMAND HANDLER
// ═══════════════════════════════════════════════════════

function runCommand(cmd, echo = true) {
  const c = cmd.trim().toLowerCase();
  if (!c) return;
  if (echo) { echoCmd(cmd); blank(); }

  switch (c) {
    case 'help':      renderHelp(); break;
    case 'neofetch':  renderNeofetch(); break;
    case 'about':     renderAbout(); break;
    case 'research':  renderResearch(); break;
    case 'projects':  renderProjects(); break;
    case 'skills':    renderSkills(); break;
    case 'contact':   renderContact(); break;
    case 'targets':   renderTargets(); break;
    case 'interests': renderInterests(); break;
    case 'form':
      startContactForm();
      break;
    case 'clear':
      termOut.innerHTML = '';
      renderNeofetch();
      break;
    case 'exit':
      showScreen('login-screen');
      loginInput.focus();
      break;
    case 'sudo':
    case 'sudo su':
      writeln(`<span class="c-red">[sudo] permission denied: you are not root (and you don't need to be)</span>`);
      break;
    case 'ls':
      writeln(`<span class="c-cyan">about</span>  <span class="c-cyan">research</span>  <span class="c-cyan">projects</span>  <span class="c-cyan">skills</span>  <span class="c-cyan">contact</span>  <span class="c-cyan">targets</span>  <span class="c-cyan">interests</span>`);
      break;
    case 'pwd':
      writeln(`<span class="c-white">/home/aralithic</span>`);
      break;
    case 'whoami':
      writeln(`<span class="c-white">umair — AraLithic — HPC researcher, CSE Y2, Bhubaneswar</span>`);
      break;
    case 'uname -a':
      writeln(`<span class="c-dim">AraLithic-OS 2.1.0-lts #1 SMP x86_64 GNU/Linux</span>`);
      break;
    case 'date':
      writeln(`<span class="c-white">${new Date().toString()}</span>`);
      break;
    case 'uptime':
      writeln(`<span class="c-white">up since login — idle 0%, jobs 1</span>`);
      break;
    case 'history':
      cmdHistory.forEach((h, i) => writeln(`<span class="c-dim">${String(i+1).padStart(4,' ')}  ${h}</span>`));
      break;
    default:
      writeln(`<span class="c-red">command not found: <span class="c-white">${c}</span></span>`);
      writeln(`<span class="c-dim">Type <span class="c-cyan">help</span> for available commands.</span>`);
  }
}

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = cmdInput.value;
    cmdInput.value = '';
    blank();

    // ── FORM MODE ──
    if (formMode) {
      if (formStep === 'confirm') {
        handleFormConfirm(val);
      } else {
        handleFormInput(val);
      }
      return;
    }

    // ── NORMAL SHELL ──
    cmdHistory.push(val);
    histIdx = cmdHistory.length;
    runCommand(val);
    blank();
    scrollToBottom(); // always scroll after user command
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; cmdInput.value = cmdHistory[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; cmdInput.value = cmdHistory[histIdx]; }
    else { histIdx = cmdHistory.length; cmdInput.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const partial = cmdInput.value.toLowerCase();
    const all = ['help','neofetch','about','research','projects','skills','contact','targets','interests','form','clear','exit','ls','pwd','whoami','uname -a','date','uptime','history'];
    const match = all.filter(c => c.startsWith(partial));
    if (match.length === 1) cmdInput.value = match[0];
    else if (match.length > 1) {
      blank();
      writeln(`<span class="c-dim">${match.join('  ')}</span>`);
    }
  }
});

// Keep input focused
document.getElementById('terminal-screen').addEventListener('click', () => cmdInput.focus());
document.getElementById('login-screen').addEventListener('click', () => loginInput.focus());

// ═══════════════════════════════════════════════════════
// CONTACT FORM — terminal wizard via "form" command
// ═══════════════════════════════════════════════════════

let formMode = false;        // are we in form-collection mode?
let formStep = 0;            // current step index
let formData  = {};          // collected field values
const FORM_ENDPOINT = 'https://formspree.io/f/mqeyzpnq';

const FORM_STEPS = [
  { key: 'name',    label: 'your name',          hint: 'e.g. Jane Smith',             validate: v => v.length >= 2 },
  { key: 'email',   label: 'your email address', hint: 'e.g. jane@example.com',       validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
  { key: 'subject', label: 'subject',             hint: 'e.g. Research Collaboration', validate: v => v.length >= 3 },
  { key: 'message', label: 'message',             hint: 'your full message here',      validate: v => v.trim().length >= 10 },
];

function formPrompt(step) {
  const s = FORM_STEPS[step];
  writeln(`<span class="c-amber">  [${step + 1}/${FORM_STEPS.length}]</span> <span class="c-white">${s.label}</span> <span class="c-dim">— ${s.hint}</span>`);
  writeln(`<span class="c-pink">  form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span>`);
}

function startContactForm() {
  blank();
  writeln(`<span class="c-pink bold">┌─ contact form ───────────────────────────────────────┐</span>`);
  writeln(`<span class="c-dim">  Send me a direct message. Fill in each field and</span>`);
  writeln(`<span class="c-dim">  press Enter to proceed. Type <span class="c-red">abort</span> at any point to exit.</span>`);
  writeln(`<span class="c-pink bold">└──────────────────────────────────────────────────────┘</span>`);
  blank();
  formMode = true;
  formStep = 0;
  formData  = {};
  // Change prompt colour hint
  updateFormPromptStyle(true);
  formPrompt(0);
  scrollToBottom();
}

function updateFormPromptStyle(active) {
  const ps1 = document.querySelector('#input-bar .prompt-ps1');
  if (!ps1) return;
  if (active) {
    ps1.innerHTML = `<span class="c-pink">form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span>`;
  } else {
    ps1.innerHTML = `<span class="c-green">umair</span><span class="c-dim">@</span><span class="host c-cyan">aralithic</span><span class="c-dim">:</span><span class="path c-purple">~</span><span class="c-dim">$</span>`;
  }
}

function handleFormInput(val) {
  const trimmed = val.trim();

  // Echo user input in pink
  writeln(`<span class="c-pink">form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span> <span class="c-white">${trimmed}</span>`);

  if (trimmed.toLowerCase() === 'abort') {
    blank();
    writeln(`<span class="c-red">  ✕ form aborted.</span>`);
    blank();
    formMode = false;
    updateFormPromptStyle(false);
    scrollToBottom();
    return;
  }

  const step = FORM_STEPS[formStep];
  if (!step.validate(trimmed)) {
    writeln(`<span class="c-red">  ✕ invalid ${step.label} — please try again.</span>`);
    formPrompt(formStep);
    scrollToBottom();
    return;
  }

  formData[step.key] = trimmed;
  blank();

  formStep++;
  if (formStep < FORM_STEPS.length) {
    formPrompt(formStep);
    scrollToBottom();
  } else {
    // All fields collected — show preview
    writeln(`<span class="c-amber bold">┌─ confirm & send ─────────────────────────────────────┐</span>`);
    writeln(`  <span class="c-dim">name   :</span> <span class="c-white">${formData.name}</span>`);
    writeln(`  <span class="c-dim">email  :</span> <span class="c-white">${formData.email}</span>`);
    writeln(`  <span class="c-dim">subject:</span> <span class="c-white">${formData.subject}</span>`);
    writeln(`  <span class="c-dim">message:</span> <span class="c-white">${formData.message}</span>`);
    writeln(`<span class="c-amber bold">└──────────────────────────────────────────────────────┘</span>`);
    blank();
    writeln(`<span class="c-dim">  Type <span class="c-green">yes</span> to send · <span class="c-red">no</span> to discard · <span class="c-red">abort</span> to exit</span>`);
    writeln(`<span class="c-pink">form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span>`);
    formStep = 'confirm';
    scrollToBottom();
  }
}

async function handleFormConfirm(val) {
  const v = val.trim().toLowerCase();
  writeln(`<span class="c-pink">form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span> <span class="c-white">${val.trim()}</span>`);
  blank();

  if (v === 'yes') {
    writeln(`<span class="c-dim">  ▸ Transmitting message...</span>`);
    scrollToBottom();
    try {
      const res = await fetch(FORM_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          name:    formData.name,
          email:   formData.email,
          subject: formData.subject,
          message: formData.message,
        }),
      });
      if (res.ok) {
        writeln(`<span class="c-green bold">  ✓ message sent successfully.</span>`);
        writeln(`<span class="c-dim">    I'll get back to you at <span class="c-white">${formData.email}</span></span>`);
      } else {
        writeln(`<span class="c-red">  ✕ transmission failed (HTTP ${res.status}). Try emailing directly.</span>`);
      }
    } catch {
      writeln(`<span class="c-red">  ✕ network error. Check connection or email me directly.</span>`);
    }
  } else if (v === 'no') {
    writeln(`<span class="c-amber">  ✕ message discarded.</span>`);
  } else if (v === 'abort') {
    writeln(`<span class="c-red">  ✕ form aborted.</span>`);
  } else {
    writeln(`<span class="c-red">  ✕ type <span class="c-green">yes</span>, <span class="c-red">no</span>, or <span class="c-red">abort</span>.</span>`);
    writeln(`<span class="c-pink">form</span><span class="c-dim">@</span><span class="c-cyan">aralithic</span><span class="c-dim">:</span><span class="c-purple">~</span><span class="c-dim">$</span>`);
    scrollToBottom();
    return; // stay in confirm mode
  }

  blank();
  formMode = false;
  formStep = 0;
  updateFormPromptStyle(false);
  scrollToBottom();
}

</script>
